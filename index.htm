<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services Dashboard</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Personal services dashboard">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Services">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Services Dashboard">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons for various platforms -->
    <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            max-height: calc(100vh - 4rem);
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #f0f0f0;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }

        .header-controls {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-shrink: 0;
        }

        .header-controls.visible {
            display: flex;
        }

        .toggle-button {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            color: #f0f0f0;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toggle-button:hover {
            background: rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.6);
        }

        .toggle-button:active {
            transform: scale(0.95);
        }

        .hide-urls .service-url {
            display: none;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            padding: 1rem;
            overflow-y: auto;
            flex-grow: 1;
        }

        .service-card {
            background: rgba(30, 30, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background: rgba(40, 40, 55, 0.9);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .service-card:hover::before {
            transform: scaleX(1);
        }

        .service-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            padding: 15px;
            position: relative;
            transition: all 0.3s ease;
        }

        .service-card:hover .service-icon {
            border-color: rgba(99, 102, 241, 0.6);
            background: rgba(25, 25, 35, 0.95);
        }

        .service-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .service-icon .fallback-text {
            position: absolute;
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
        }

        .service-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #f0f0f0;
        }

        .service-url {
            font-size: 0.875rem;
            color: #9ca3af;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: none;
            line-height: 1.4;
        }

        .loading {
            text-align: center;
            color: #f0f0f0;
            font-size: 1.5rem;
            margin-top: 4rem;
        }

        .error {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            color: #f87171;
            max-width: 500px;
            margin: 4rem auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @media (min-width: 1024px) {
            .services-grid {
                grid-auto-rows: minmax(150px, 1fr);
            }
            
            .service-card {
                padding: 1.5rem;
            }
            
            h1 {
                font-size: 2rem;
                margin-bottom: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            body {
                display: block;
                padding: 1rem;
            }
            
            .container {
                max-height: none;
            }
            
            .services-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
                overflow-y: visible;
            }

            h1 {
                font-size: 2rem;
            }

            .service-icon {
                width: 60px;
                height: 60px;
                font-size: 2rem;
                padding: 12px;
            }
        }

        /* Animation for cards appearing */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .service-card {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Services Dashboard</h1>
        <div class="header-controls">
            <button id="url-toggle" class="toggle-button">
                <span id="toggle-text">Show URLs</span>
            </button>
        </div>
        <div id="services-container" class="loading">Loading services...</div>
    </div>

    <script>
        let BASE_URL = 'local.b12e.es'; // Default fallback
        let urlsVisible = true;
        let defaultUrlsVisible = null; // Will be set from config
        
        // Load configuration
        async function loadConfiguration() {
            try {
                const response = await fetch('configuration.json');
                if (response.ok) {
                    const config = await response.json();
                    
                    // Set base URL from config if provided
                    if (config.baseUrl) {
                        BASE_URL = config.baseUrl;
                        console.log('Base URL set from config:', BASE_URL);
                    }
                    
                    // Set default URL visibility from config if provided
                    if (typeof config.showUrlsByDefault === 'boolean') {
                        defaultUrlsVisible = config.showUrlsByDefault;
                        console.log('Default URL visibility set from config:', defaultUrlsVisible);
                    }
                } else {
                    console.log('No configuration.json found, using defaults');
                }
            } catch (error) {
                console.log('Error loading configuration, using defaults:', error);
            }
        }
        
        // Initialize URL visibility based on stored preference, config, or device type
        function initializeUrlVisibility() {
            const stored = localStorage.getItem('urlsVisible');
            if (stored !== null) {
                // Use stored preference if it exists
                urlsVisible = stored === 'true';
            } else if (defaultUrlsVisible !== null) {
                // Use config default if no stored preference
                urlsVisible = defaultUrlsVisible;
            } else {
                // Fall back to device-based default
                urlsVisible = window.innerWidth > 768;
            }
            updateUrlVisibility();
        }
        
        // Toggle URL visibility
        function toggleUrls() {
            urlsVisible = !urlsVisible;
            localStorage.setItem('urlsVisible', urlsVisible);
            updateUrlVisibility();
        }
        
        // Update UI based on URL visibility state
        function updateUrlVisibility() {
            const container = document.getElementById('services-container');
            const toggleText = document.getElementById('toggle-text');
            
            if (urlsVisible) {
                container.classList.remove('hide-urls');
                toggleText.textContent = 'Hide URLs';
            } else {
                container.classList.add('hide-urls');
                toggleText.textContent = 'Show URLs';
            }
        }
        
        async function loadServices() {
            const container = document.getElementById('services-container');
            
            try {
                const response = await fetch('services.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data.services || !Array.isArray(data.services)) {
                    throw new Error('Invalid services data structure');
                }
                
                displayServices(data.services);
                
            } catch (error) {
                console.error('Error loading services:', error);
                container.className = 'error';
                container.innerHTML = `
                    <h2>Failed to load services</h2>
                    <p>${error.message}</p>
                    <p style="font-size: 0.875rem; margin-top: 1rem;">Make sure services.json is in the same directory as this HTML file.</p>
                `;
            }
        }
        
        function displayServices(services) {
            const container = document.getElementById('services-container');
            const headerControls = document.querySelector('.header-controls');
            container.className = 'services-grid';
            
            // Reapply hide-urls class if URLs should be hidden
            if (!urlsVisible) {
                container.classList.add('hide-urls');
            }
            
            if (services.length === 0) {
                container.innerHTML = '<div class="error">No services found in services.json</div>';
                return;
            }
            
            // Show the toggle button only when services are successfully loaded
            headerControls.classList.add('visible');
            
            container.innerHTML = services.map(service => {
                const url = service.subdomain 
                    ? `https://${service.subdomain}.${BASE_URL}`
                    : `https://${BASE_URL}`;
                
                // Get first letter(s) for fallback icon
                const iconText = service.name
                    .split(' ')
                    .map(word => word[0])
                    .join('')
                    .substring(0, 2)
                    .toUpperCase();
                
                // Generate icon name for the CDN - lowercase, spaces to hyphens, remove other special characters
                const iconName = service.name.toLowerCase()
                    .replace(/\s+/g, '-') // Replace spaces with hyphens
                    .replace(/[^a-z0-9-]/g, ''); // Keep only letters, numbers, and hyphens
                
                const svgUrl = `https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/${iconName}.svg`;
                const pngUrl = `https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/${iconName}.png`;
                
                // Format URL for display - insert zero-width space BEFORE the dot after subdomain
                let displayUrl = url.replace('https://', '');
                if (service.subdomain) {
                    // Insert zero-width space BEFORE the dot (not after)
                    displayUrl = service.subdomain + '\u200B.' + BASE_URL;
                }
                
                return `
                    <a href="${url}" class="service-card" target="_blank">
                        <div class="service-icon">
                            <img src="${svgUrl}" 
                                 alt="${service.name} icon" 
                                 onerror="this.onerror=null; this.src='${pngUrl}'; this.addEventListener('error', function() { this.style.display='none'; this.nextElementSibling.style.display='block'; });">
                            <span class="fallback-text" style="display: none;">${iconText}</span>
                        </div>
                        <div class="service-name">${service.name}</div>
                        <div class="service-url">${displayUrl}</div>
                    </a>
                `;
            }).join('');
            
            // Apply staggered animation delays to all cards
            const cards = container.querySelectorAll('.service-card');
            cards.forEach((card, index) => {
                // Cap the delay at a reasonable maximum to avoid too long animations
                const delay = Math.min(index * 0.05, 1.5); // 50ms per card, max 1.5s
                card.style.animationDelay = `${delay}s`;
            });
        }
        
        // Load services when page loads
        document.addEventListener('DOMContentLoaded', async () => {
            // Load configuration first
            await loadConfiguration();
            
            // Then initialize UI and load services
            initializeUrlVisibility();
            loadServices();
            
            // Set up toggle button
            document.getElementById('url-toggle').addEventListener('click', toggleUrls);
            
            // Register service worker for PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.log('Service Worker registration failed', err));
            }
        });
    </script>
</body>
</html>
