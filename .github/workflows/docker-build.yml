name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - beta
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: b12e/services-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate version number
        id: version
        run: |
          # Generate version based on date and commit
          VERSION="$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Merge to main: tag as 'latest' + version
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            # PRs: tag with branch name (e.g., pr-123 or feature-name)
            type=ref,event=pr,prefix=pr-
            # Semver tags (e.g., v1.2.3)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Show image tags
        run: |
          echo "Image pushed with the following tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Image digest: ${{ steps.build.outputs.digest }}"

      # Sync README.md to Docker Hub when merging to main
      # This ensures the Docker Hub description stays up-to-date with the GitHub README
      # Requires DOCKERHUB_TOKEN to be a Personal Access Token with Read/Write permissions
      - name: Update Docker Hub README
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md

      - name: Delete PR tag from Docker Hub after merge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Get the PR number from the commit message
          PR_NUMBER=$(git log -1 --pretty=%B | grep -oP '(?<=#)\d+(?=\))' || echo "")

          if [ -n "$PR_NUMBER" ]; then
            TAG="pr-${PR_NUMBER}"
            echo "Attempting to delete Docker tag: ${TAG}"

            # Get Docker Hub token
            TOKEN=$(curl -s -H "Content-Type: application/json" -X POST \
              -d '{"username": "${{ secrets.DOCKERHUB_USERNAME }}", "password": "${{ secrets.DOCKERHUB_TOKEN }}"}' \
              https://hub.docker.com/v2/users/login/ | jq -r .token)

            # Delete the tag
            curl -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/${TAG}/" \
              && echo "Successfully deleted tag ${TAG}" \
              || echo "Failed to delete tag ${TAG} (may not exist)"
          else
            echo "No PR number found in commit message, skipping tag deletion"
          fi
